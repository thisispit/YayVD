<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAYVD - YouTube Downloader</title>
    <style>
        :root {
            --accent-color: #ff4444;
            --bg-color: #1a1a1a;
            --card-bg: #242424;
            --text-color: #ffffff;
        }

        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        /* Common styles */
        .card, .status-wrapper {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Form elements common styles */
        button, select, input[type="text"] {
            min-height: 44px;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, var(--accent-color), #ff8080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #888;
            font-size: 1.1rem;
        }

        #downloadForm {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            gap: 1rem;
        }

        input[type="text"] {
            flex: 1;
            border: 2px solid #333;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(255, 68, 68, 0.2);
        }

        button {
            background: var(--accent-color);
            border: none;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #ff5555;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        select {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #333;
            color: var(--text-color);
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .spinner {
            width: 48px;
            height: 48px;
            margin: 0 auto 1.5rem;
            border: 4px solid rgba(255, 68, 68, 0.1);
            border-left-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .status-text {
            font-size: 1.2rem;
            font-weight: 500;
        }

        .success-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .checkmark {
            width: 48px;
            height: 48px;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            text-align: center;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .container {
                width: 100%;
                padding: 0;
            }

            .header {
                margin-bottom: 1.5rem;
            }

            .logo {
                font-size: 2.2rem;
            }

            .card {
                padding: 1.25rem;
                margin-bottom: 1.5rem;
            }

            .input-group {
                flex-direction: column;
                gap: 0.75rem;
            }

            input[type="text"] {
                width: 100%;
                padding: 0.875rem;
                font-size: 16px; /* Prevents iOS zoom */
            }

            button {
                width: 100%;
                padding: 0.875rem;
                font-size: 16px;
            }

            #formatSelect {
                margin-top: 0.75rem;
                padding: 0.875rem;
                font-size: 16px;
            }

            .status-wrapper {
                padding: 1.25rem;
                margin: 0 0.5rem;
            }

            .spinner {
                width: 40px;
                height: 40px;
                border-width: 3px;
            }

            .status-text {
                font-size: 1rem;
            }

            .success-message {
                padding: 0.5rem;
            }

            .checkmark {
                width: 40px;
                height: 40px;
            }

            .error-message {
                margin: 1rem 0.5rem;
                padding: 0.875rem;
                font-size: 0.9rem;
            }
        }

        /* Additional mobile improvements */
        @media (max-width: 480px) {
            .logo {
                font-size: 2rem;
            }

            .header p {
                font-size: 0.9rem;
            }

            .card {
                padding: 1rem;
            }

            input[type="text"]::placeholder {
                font-size: 14px;
            }
        }

        /* Smooth scroll behavior */
        html {
            scroll-behavior: smooth;
        }

        /* Prevent pull-to-refresh on mobile */
        body {
            overscroll-behavior-y: contain;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, var(--accent-color), #ff8080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            font-weight: 300;
        }

        #formatSelect {
            display: none; /* Hidden by default */
            margin-top: 1rem;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #333;
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        #formatSelect option {
            background: var(--card-bg);
            color: var(--text-color);
            padding: 10px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="logo">YAY<span>VD</span></h1>
            <p>Yet Another YouTube Video Downloader</p>
        </div>

        <div class="card">
            <form id="downloadForm" method="post">
                <div class="input-group">
                    <input type="text" name="video_url" id="videoUrl" placeholder="Paste YouTube URL here" required>
                    <button type="submit" id="submitBtn">Download</button>
                </div>
                <select name="format" id="formatSelect">
                    <!-- Options will be dynamically populated with video size -->
                </select>
            </form>
        </div>

        <div id="downloadStatus" style="display: none;" class="status-wrapper">
            <div class="spinner"></div>
            <div class="status-text">Downloading video...</div>
            <div class="success-message" style="display: none;">
                <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                    <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none" stroke="var(--accent-color)" stroke-width="2"/>
                    <path class="checkmark-check" fill="none" stroke="var(--accent-color)" stroke-width="2" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                </svg>
                <div>Video Downloaded Successfully!</div>
            </div>
        </div>

        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}
    </div>

    <script>
        // Cache DOM elements
        const elements = {
            form: document.getElementById('downloadForm'),
            urlInput: document.getElementById('videoUrl'),
            formatSelect: document.getElementById('formatSelect'),
            submitBtn: document.getElementById('submitBtn'),
            status: document.getElementById('downloadStatus'),
            statusText: document.querySelector('.status-text'),
            spinner: document.querySelector('.spinner'),
            successMessage: document.querySelector('.success-message')
        };

        // Create loading indicator once
        const loadingIndicator = document.createElement('div');
        loadingIndicator.className = 'loading';
        loadingIndicator.style.display = 'none';
        elements.submitBtn.appendChild(loadingIndicator);

        // Debounce function for URL input
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        // Handle URL input with debounce
        elements.urlInput.addEventListener('input', debounce(async function() {
            const url = this.value.trim();
            if (!url) {
                elements.formatSelect.style.display = 'none';
                return;
            }

            loadingIndicator.style.display = 'inline-block';
            elements.submitBtn.disabled = true;

            try {
                const response = await fetch('/get-formats', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `video_url=${encodeURIComponent(url)}`
                });
                const data = await response.json();

                if (data.formats) {
                    elements.formatSelect.innerHTML = data.formats
                        .map(format => `<option value="${format.format_id}">${format.text}</option>`)
                        .join('');
                    elements.formatSelect.style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
            } finally {
                loadingIndicator.style.display = 'none';
                elements.submitBtn.disabled = false;
            }
        }, 500));

        // Your existing form submission code remains the same
        elements.form.addEventListener('submit', function(e) {
            const statusDiv = elements.status;
            const statusText = elements.statusText;
            const spinner = elements.spinner;
            const successMessage = elements.successMessage;
            
            statusDiv.style.display = 'block';
            spinner.style.display = 'block';
            successMessage.style.display = 'none';
            statusText.style.display = 'block';
            
            const checkStatus = setInterval(function() {
                fetch('/check-status')
                    .then(response => response.json())
                    .then(data => {
                        if (data.state === 'downloading') {
                            statusText.textContent = 'Downloading video...';
                        } else if (data.state === 'processing') {
                            statusText.textContent = 'Processing video...';
                        } else if (data.state === 'done') {
                            clearInterval(checkStatus);
                            spinner.style.display = 'none';
                            statusText.style.display = 'none';
                            successMessage.style.display = 'block';
                            setTimeout(() => {
                                statusDiv.style.display = 'none';
                                resetUI();
                            }, 3000);
                        }
                    });
            }, 1000);
        });

        function resetUI() {
            const statusDiv = elements.status;
            const spinner = elements.spinner;
            const successMessage = elements.successMessage;
            const statusText = elements.statusText;
            
            statusDiv.style.display = 'none';
            spinner.style.display = 'block';
            successMessage.style.display = 'none';
            statusText.style.display = 'block';
            loadingIndicator.style.display = 'none';
            elements.submitBtn.disabled = false;
            elements.submitBtn.style.opacity = '1';
            elements.formatSelect.style.display = 'none';
            elements.urlInput.value = '';
        }
    </script>
</body>
</html>
