<!DOCTYPE html>
<html>
<head>
    <title>YouTube Downloader</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --text-color: #ffffff;
            --input-bg: #1a1a1a;
            --input-border: #333333;
            --accent-color: #ff0000;
            --error-color: #ff4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .logo {
            color: var(--accent-color);
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            text-align: center;
            margin-bottom: 2rem;
            color: var(--text-color);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        input[type="url"],
        .format-select {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 0.9rem;
            transition: border-color 0.2s ease;
        }

        input[type="url"]:focus,
        .format-select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .format-select {
            cursor: pointer;
            display: none;
        }

        .format-select option {
            background-color: var(--input-bg);
            color: var(--text-color);
            padding: 8px;
        }

        input[type="submit"] {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        input[type="submit"]:hover {
            opacity: 0.9;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 1rem;
        }

        .loading-spinner {
            display: inline-block;
            width: 1.5rem;
            height: 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--text-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .error {
            background: rgba(255, 0, 0, 0.1);
            color: var(--error-color);
            padding: 0.8rem;
            border-radius: 8px;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Mobile adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }

            h1 {
                font-size: 1.2rem;
            }

            .logo {
                font-size: 1.5rem;
            }
        }

        .branding {
            text-align: center;
            margin-bottom: 2rem;
        }

        .branding h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, var(--accent-color), #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-top: -0.5rem;
        }

        @media (max-width: 480px) {
            .branding h1 {
                font-size: 1.8rem;
            }
            
            .subtitle {
                font-size: 0.8rem;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fab fa-youtube"></i>
        </div>
        <div class="branding">
            <h1>YayVD</h1>
            <p class="subtitle">Yet Another YouTube Video Downloader</p>
        </div>

        <form method="POST" id="downloadForm">
            <input type="url" id="video_url" name="video_url" 
                   placeholder="Paste YouTube URL here" required>
            
            <select name="format" id="formatSelect" class="format-select">
                <option value="best">Select Quality</option>
            </select>
            
            <input type="submit" id="submitBtn" value="Download">
        </form>

        <div class="loading" id="loadingIndicator">
            <div class="loading-spinner"></div>
        </div>

        {% if error %}
        <div class="error">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}
    </div>

    <script>
        const videoInput = document.getElementById('video_url');
        const formatSelect = document.getElementById('formatSelect');
        const downloadForm = document.getElementById('downloadForm');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const submitBtn = document.getElementById('submitBtn');
        let formatCheckTimeout;

        videoInput.addEventListener('input', function() {
            clearTimeout(formatCheckTimeout);
            formatSelect.style.display = 'none';
            formatSelect.innerHTML = '<option value="best">Select Quality</option>';
            
            if (this.value.match(/^https?:\/\/(www\.)?(youtube\.com\/watch\?v=|youtu\.be\/)/)) {
                formatCheckTimeout = setTimeout(getFormats, 1000);
            }
        });

        function getFormats() {
            const loadingText = document.createElement('option');
            loadingText.text = 'Loading formats...';
            formatSelect.innerHTML = '';
            formatSelect.appendChild(loadingText);
            formatSelect.style.display = 'block';

            const formData = new FormData();
            formData.append('video_url', videoInput.value);

            fetch('/get-formats', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                formatSelect.innerHTML = '';
                if (data.formats) {
                    data.formats.forEach(format => {
                        const option = document.createElement('option');
                        option.value = format.format_id;
                        option.text = format.text;
                        formatSelect.appendChild(option);
                    });
                    formatSelect.style.display = 'block';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                formatSelect.style.display = 'none';
            });
        }

        downloadForm.addEventListener('submit', function(e) {
            loadingIndicator.style.display = 'block';
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.7';
            
            // Create a timeout to check if the download prompt appeared
            setTimeout(() => {
                // If the download hasn't started after 2 seconds, start checking for it
                const checkDownloadStarted = setInterval(() => {
                    // Check if the button is still disabled (download hasn't started)
                    if (document.activeElement.tagName === 'IFRAME' || 
                        document.activeElement.tagName === 'OBJECT' || 
                        document.hidden) {
                        // Download prompt detected, reset the UI
                        clearInterval(checkDownloadStarted);
                        resetUI();
                    }
                }, 500); // Check every 500ms

                // Set a maximum timeout of 60 seconds
                setTimeout(() => {
                    clearInterval(checkDownloadStarted);
                    resetUI();
                }, 60000);
            }, 2000);
        });

        // Function to reset the UI state
        function resetUI() {
            loadingIndicator.style.display = 'none';
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';
        }
    </script>
</body>
</html>
